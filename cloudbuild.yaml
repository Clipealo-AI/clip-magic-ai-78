steps:
  - name: "oven/bun:1.3.13"
    id: "install"
    entrypoint: "bun"
    args: ["install", "--frozen-lockfile"]

  - name: "oven/bun:1.3.13"
    id: "build"
    waitFor: ["install"]
    entrypoint: "bun"
    args: ["run", "build"]

  - name: "node:20-slim"
    id: "deploy"
    waitFor: ["build"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail
        npm install -g firebase-tools@14
        firebase deploy \
          --only hosting:${_FIREBASE_SITE} \
          --project=${PROJECT_ID} \
          --non-interactive

substitutions:
  _FIREBASE_SITE: "clipealo-ai-landing"
  _SERVICE_ACCOUNT: "landing-firebase-deployer@clipealo-492905.iam.gserviceaccount.com"

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true

timeout: "600s"
